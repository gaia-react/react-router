name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Vitest and Playwright
    if: (github.event_name == 'pull_request') && !startsWith(github.head_ref, 'wiki/') && !startsWith(github.head_ref, 'chore/')
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      # Fallback placeholders let PRs from forks (which can't read repo secrets) still run the suite.
      # MSW intercepts outbound HTTP so the real API_URL is not needed; SESSION_SECRET just needs to be non-empty.
      API_URL: ${{ secrets.API_URL || 'http://localhost:3000/api' }}
      MSW_ENABLED: ${{ secrets.MSW_ENABLED || 'true' }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-placeholder-session-secret-not-real' }}
      SITE_URL: ${{ secrets.SITE_URL || 'http://localhost:3000' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint-dry
      - name: Run Vitest tests
        run: pnpm test:ci
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          npm_package_version: ${{ steps.package-version.outputs.current-version}}
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          npm_package_version: ${{ steps.package-version.outputs.current-version}}
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        name: Upload Playwright failed test traces
        with:
          name: playwright-traces
          path: .playwright/output
          retention-days: 5
